<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Dotted grid overlay for premium feel -->
  <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#334155" opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dotGrid)"/>

  <!-- Icon group -->
  <g transform="translate(200, 95)" text-anchor="middle">
    <!-- Image Outline -->
    <rect x="-30" y="-35" width="60" height="50" rx="8" fill="none" stroke="url(#iconGradient)" stroke-width="2" stroke-dasharray="3 3" opacity="0.8"/>
    
    <!-- Mountains inside picture outline -->
    <path d="M-22,10 L-10,-5 L2,7 L12,-2 L24,10 Z" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="14" cy="-16" r="3" fill="url(#iconGradient)" opacity="0.6"/>
    
    <!-- Slash across picture indicating 'No' -->
    <line x1="-35" y1="20" x2="35" y2="-45" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    
    <!-- Text -->
    <text y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">
      NO COVER IMAGE
    </text>
  </g>
</svg>
